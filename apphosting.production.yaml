# Firebase App Hosting — backend de PRODUÇÃO (ultimate-drift-production) do site público.
# Carregado automaticamente quando o backend está marcado com environment=production.
# minInstances=1 garante warm start — crítico pra TTFB do Googlebot e Core Web Vitals.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 20
  minInstances: 1
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: REPLACE_ME_PRD_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ultimate-drift-production.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ultimate-drift-production
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ultimate-drift-production.appspot.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: REPLACE_ME_PRD_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: REPLACE_ME_PRD_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SITE_URL
    value: https://www.ultimatedrift.com.br
    availability:
      - BUILD
      - RUNTIME

