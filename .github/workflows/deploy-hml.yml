# Deploy de HML — push em main dispara um rollout no backend App Hosting
# `ud-site` do projeto juiz-ud-stage.
#
# OBS: o App Hosting já tem auto-rollout ligado ao repo. Este workflow é a
# forma explícita do pipeline e dá rastreabilidade no Actions. Se houver
# duplicidade, desligar o auto-rollout no console do App Hosting.

name: deploy-hml

on:
  push:
    branches: [main]

concurrency:
  group: deploy-hml
  cancel-in-progress: false

jobs:
  rollout:
    name: Rollout em juiz-ud-stage
    runs-on: ubuntu-latest
    environment:
      name: hml
      url: https://ud-site--juiz-ud-stage.us-east4.hosted.app
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_HML }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: juiz-ud-stage

      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest

      - name: Criar rollout no App Hosting
        run: |
          firebase apphosting:rollouts:create ud-site \
            --project=juiz-ud-stage \
            --git-branch=main \
            --force
