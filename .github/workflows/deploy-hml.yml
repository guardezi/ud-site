# Smoke test pós auto-rollout — push em main dispara o auto-rollout do
# Firebase App Hosting (configurado no console). Este workflow aguarda o
# build estabilizar e faz uma checagem HTTP simples na URL de HML.
#
# Removemos a chamada `apphosting:rollouts:create` porque conflitava com
# o auto-rollout (409 duplicate buildId). Se desejar deploy explícito via
# CLI, desligue o auto-rollout no console antes.

name: smoke-hml

on:
  push:
    branches: [main]

concurrency:
  group: smoke-hml
  cancel-in-progress: false

jobs:
  wait-and-check:
    name: Aguardar auto-rollout e checar HTTP 200
    runs-on: ubuntu-latest
    environment:
      name: hml
      url: https://ud-site--juiz-ud-stage.us-east4.hosted.app
    steps:
      - name: Aguardar deploy estabilizar (90s)
        run: sleep 90

      - name: Checar homepage retorna 200
        run: |
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" https://ud-site--juiz-ud-stage.us-east4.hosted.app/)
          echo "HTTP $STATUS"
          test "$STATUS" = "200"

      - name: Checar sitemap
        run: |
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" https://ud-site--juiz-ud-stage.us-east4.hosted.app/sitemap.xml)
          echo "HTTP $STATUS"
          test "$STATUS" = "200"

      - name: Checar robots.txt
        run: |
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" https://ud-site--juiz-ud-stage.us-east4.hosted.app/robots.txt)
          echo "HTTP $STATUS"
          test "$STATUS" = "200"
